<!DOCTYPE html>\n<html lang='es'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Almacenamiento Local</title>\n</head>\n<body>\n    <h1>Gestión de Almacenamiento Local</h1>\n    <form id='dataForm'>\n        <input type='text' id='dataInput' placeholder='Escribe un dato' required>\n        <button type='submit'>Guardar</button>\n    </form>\n    <h2>Datos Guardados</h2>\n    <ul id='dataList'></ul>\n    <script>\n        document.getElementById('dataForm').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const dataInput = document.getElementById('dataInput');\n            const data = dataInput.value;\n            saveData(data);\n            dataInput.value = '';\n        });\n        function saveData(data) {\n            let existingData = JSON.parse(localStorage.getItem('dataList')) || [];\n            existingData.push(data);\n            localStorage.setItem('dataList', JSON.stringify(existingData));\n            renderDataList();\n        }\n        function renderDataList() {\n            const dataList = JSON.parse(localStorage.getItem('dataList')) || [];\n            const dataListElement = document.getElementById('dataList');\n            dataListElement.innerHTML = '';\n            dataList.forEach((item, index) => {\n                const listItem = document.createElement('li');\n                listItem.textContent = item;\n                listItem.appendChild(createEditButton(index));\n                listItem.appendChild(createDeleteButton(index));\n                dataListElement.appendChild(listItem);\n            });\n        }\n        function createEditButton(index) {\n            const button = document.createElement('button');\n            button.textContent = 'Editar';\n            button.onclick = () => editData(index);\n            return button;\n        }\n        function createDeleteButton(index) {\n            const button = document.createElement('button');\n            button.textContent = 'Eliminar';\n            button.onclick = () => deleteData(index);\n            return button;\n        }\n        function editData(index) {\n            const dataList = JSON.parse(localStorage.getItem('dataList'));\n            const newData = prompt('Editar dato:', dataList[index]);\n            if (newData) {\n                dataList[index] = newData;\n                localStorage.setItem('dataList', JSON.stringify(dataList));\n                renderDataList();\n            }\n        }\n        function deleteData(index) {\n            const dataList = JSON.parse(localStorage.getItem('dataList'));\n            dataList.splice(index, 1);\n            localStorage.setItem('dataList', JSON.stringify(dataList));\n            renderDataList();\n        }\n        window.onload = renderDataList;\n    </script>\n</body>\n</html>
